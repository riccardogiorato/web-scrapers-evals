<svg width="1100" height="590" viewBox="0 0 1100 590" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Web scraper benchmark summary</title>
  <desc id="desc">Quality-aware benchmark results for Parallel, Tavily, Firecrawl, Exa, and Linkup.</desc>
  <defs>
    <filter id="panelShadow" x="-12%" y="-12%" width="124%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1100" height="590" rx="28" fill="#FBFCFE"/>
  <rect x="1" y="1" width="1098" height="588" rx="27" stroke="#E5E7EB" stroke-width="2"/>
  <rect x="32" y="32" width="1036" height="526" rx="22" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#panelShadow)"/>

  <text x="70" y="88" fill="#111827" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="700">Web Scrapers Evals</text>
  <text x="70" y="122" fill="#6B7280" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">Quality-aware benchmark for LLM and agent web access</text>

  <text x="70" y="178" fill="#9CA3AF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">USABLE SUCCESS</text>
  <text x="650" y="178" fill="#9CA3AF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15" font-weight="700">AVERAGE TIME</text>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="70" y="223" fill="#111827" font-size="20" font-weight="700">Parallel</text>
    <rect x="190" y="202" width="360" height="28" rx="8" fill="#F1F5F9"/>
    <rect x="190" y="202" width="360" height="28" rx="8" fill="#A78BFA"/>
    <text x="515" y="223" fill="#111827" font-size="18" font-weight="700">25/25</text>
    <text x="650" y="223" fill="#7C3AED" font-size="20" font-weight="700">3.7s</text>

    <text x="70" y="278" fill="#111827" font-size="20" font-weight="700">Tavily</text>
    <rect x="190" y="257" width="360" height="28" rx="8" fill="#F1F5F9"/>
    <rect x="190" y="257" width="302" height="28" rx="8" fill="#86EFAC"/>
    <text x="515" y="278" fill="#111827" font-size="18" font-weight="700">21/25</text>
    <text x="650" y="278" fill="#16A34A" font-size="20" font-weight="700">0.3s</text>

    <text x="70" y="333" fill="#111827" font-size="20" font-weight="700">Firecrawl</text>
    <rect x="190" y="312" width="360" height="28" rx="8" fill="#F1F5F9"/>
    <rect x="190" y="312" width="302" height="28" rx="8" fill="#7DD3FC"/>
    <text x="515" y="333" fill="#111827" font-size="18" font-weight="700">21/25</text>
    <text x="650" y="333" fill="#0284C7" font-size="20" font-weight="700">1.3s</text>

    <text x="70" y="388" fill="#111827" font-size="20" font-weight="700">Exa</text>
    <rect x="190" y="367" width="360" height="28" rx="8" fill="#F1F5F9"/>
    <rect x="190" y="367" width="230" height="28" rx="8" fill="#FCD34D"/>
    <text x="515" y="388" fill="#111827" font-size="18" font-weight="700">16/25</text>
    <text x="650" y="388" fill="#D97706" font-size="20" font-weight="700">1.0s</text>

    <text x="70" y="443" fill="#111827" font-size="20" font-weight="700">Linkup</text>
    <rect x="190" y="422" width="360" height="28" rx="8" fill="#F1F5F9"/>
    <rect x="190" y="422" width="230" height="28" rx="8" fill="#FDBA74"/>
    <text x="515" y="443" fill="#111827" font-size="18" font-weight="700">16/25</text>
    <text x="650" y="443" fill="#EA580C" font-size="20" font-weight="700">6.8s</text>
  </g>

  <rect x="70" y="490" width="960" height="1" fill="#E5E7EB"/>
  <text x="70" y="522" fill="#6B7280" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="15">Success requires usable, relevant content. Short stubs, blocked pages, and wrong-page output fail the quality gate.</text>
</svg>
